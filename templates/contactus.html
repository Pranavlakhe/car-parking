<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Car Repair Contact Us</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet" />

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: url('../static/p6.jpg') no-repeat center center fixed;
      background-size: cover;
      color: #fff;
      min-height: 100vh;
      line-height: 1.6;
    }

    .contact-section {
      background: rgba(0, 0, 0, 0.7);
      min-height: 100vh;
      padding: 60px 20px;
      backdrop-filter: blur(6px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .contact-section h1 {
      font-size: 3rem;
      margin-bottom: 20px;
      color: #ffffff;
      text-shadow: 0 0 10px #ffffff;
    }

    .subtitle {
      text-align: center;
      max-width: 600px;
      margin: 0 auto 40px;
      font-size: 1.2rem;
      color: #ddd;
    }

    .contact-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 30px;
      max-width: 1100px;
      width: 100%;
      margin-top: 30px;
    }

    .contact-card {
      background: #fff;
      color: #333;
      padding: 30px;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 0 15px rgba(255, 76, 76, 0.4);
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .contact-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 0 25px rgba(255, 76, 76, 0.7);
    }

    .contact-card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: 8px;
      margin-bottom: 20px;
    }

    .icon {
      background: #ff4c4c;
      color: white;
      width: 60px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      font-size: 24px;
      margin: 0 auto 20px;
    }

    .contact-card h3 {
      margin-bottom: 10px;
      font-size: 1.5rem;
    }

    .contact-card p, .contact-card a {
      font-size: 1.1rem;
      color: #333;
      text-decoration: none;
      margin-bottom: 10px;
      display: block;
    }

    .contact-card a:hover {
      text-decoration: underline;
      color: #ff4c4c;
    }
    .center-button {
  display: flex;
  justify-content: center;
  padding: 40px 0;
}

.cta-button {
  background-color: #007bff;
  color: white;
  padding: 12px 25px;
  border-radius: 8px;
  text-decoration: none;
  font-size: 16px;
  transition: background 0.3s ease;
}

.cta-button:hover {
  background-color: #0056b3;
}

  </style>
</head>

<body>
  <section class="contact-section">
    <h1>Contact Us</h1>
    <p class="subtitle">
      Get in touch with our auto experts for any service inquiries or questions.
    </p>

    <div class="contact-grid">
      <!-- Email Card -->
      <div class="contact-card">
        <img src="../static/p2.jpg" alt="Mechanic email" loading="lazy">
        <div class="icon">
          <i class="fas fa-envelope"></i>
        </div>
        <h3>Email Us</h3>
        <a href="mailto:service@carrepair.com">service@carrepair.com</a>
        <a href="mailto:support@carrepair.com">support@carrepair.com</a>
      </div>

      <!-- Address Card -->
      <div class="contact-card">
        <img src="../static/p3.jpg" alt="Garage location" loading="lazy">
        <div class="icon">
          <i class="fas fa-map-marker-alt"></i>
        </div>
        <h3>Visit Us</h3>
        <p>123 Main St, Los Angeles, CA 90001</p>
      </div>

      <!-- Phone Card -->
      <div class="contact-card">
        <img src="../static/p4.image.jpg" alt="Call support" loading="lazy">
        <div class="icon">
          <i class="fas fa-phone"></i>
        </div>
        <h3>Call Us</h3>
        <p>+1 800-123-4567</p>
        <p>+1 800-987-6543</p>
      </div>
    </div>
  </section>

  <div class="center-button">
  <a href="/home" class="cta-button">
    Go Back <i class="fas fa-arrow-left"></i>
  </a>
</div>

</body>
</html>
